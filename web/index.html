<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>漏洞知识库</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .severity-high { color: #ef4444; }
        .severity-medium { color: #f59e0b; }
        .severity-low { color: #10b981; }
    </style>
</head>
<body class="bg-gray-50 text-gray-900 font-sans">
    <nav class="bg-blue-600 text-white shadow-lg">
        <div class="max-w-7xl mx-auto px-4 py-4 flex justify-between items-center">
            <h1 class="text-2xl font-bold"><a href="index.html">漏洞知识库</a></h1>
            <div id="last-updated" class="text-sm opacity-80"></div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-4 py-8">
        <div class="mb-8 flex flex-col md:flex-row md:items-center md:justify-between gap-4">
            <div class="relative flex-1">
                <input type="text" id="search-input" placeholder="搜索 CVE 或 标题..." 
                    class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent">
            </div>
            <div class="flex gap-2">
                <select id="severity-filter" class="px-4 py-2 border border-gray-300 rounded-lg bg-white">
                    <option value="">全部风险等级</option>
                    <option value="High">高危</option>
                    <option value="Medium">中危</option>
                    <option value="Low">低危</option>
                </select>
            </div>
        </div>

        <div id="vuln-list" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            <!-- 漏洞列表将在这里动态生成 -->
            <div class="col-span-full py-20 text-center text-gray-500">
                正在加载数据...
            </div>
        </div>

        <div id="pagination" class="mt-12 flex justify-center gap-2">
            <!-- 分页按钮 -->
        </div>
    </main>

    <script>
        let allVulnerabilities = [];
        let filteredVulnerabilities = [];
        const itemsPerPage = 12;
        let currentPage = 1;

        async function fetchData() {
            try {
                const response = await fetch('vulnerabilities.json');
                const result = await response.json();
                allVulnerabilities = result.data;
                document.getElementById('last-updated').innerText = `最后更新: ${result.last_updated}`;
                filteredVulnerabilities = [...allVulnerabilities];
                renderList();
            } catch (error) {
                console.error('加载数据失败:', error);
                document.getElementById('vuln-list').innerHTML = `
                    <div class="col-span-full py-20 text-center text-red-500">
                        加载数据失败，请确保同步脚本已运行并生成了 vulnerabilities.json
                    </div>
                `;
            }
        }

        function renderList() {
            const listContainer = document.getElementById('vuln-list');
            const startIndex = (currentPage - 1) * itemsPerPage;
            const paginatedItems = filteredVulnerabilities.slice(startIndex, startIndex + itemsPerPage);

            if (paginatedItems.length === 0) {
                listContainer.innerHTML = '<div class="col-span-full py-20 text-center text-gray-500">未找到相关漏洞</div>';
                return;
            }

            listContainer.innerHTML = paginatedItems.map(vuln => `
                <div class="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden hover:shadow-md transition-shadow cursor-pointer" 
                     onclick="window.location.href='detail.html?id=${encodeURIComponent(vuln.id)}'">
                    <div class="p-6">
                        <div class="flex justify-between items-start mb-4">
                            <span class="px-2 py-1 text-xs font-semibold rounded bg-gray-100 text-gray-600">${vuln.cve}</span>
                            <span class="text-xs font-bold uppercase ${getSeverityClass(vuln.severity)}">${vuln.severity}</span>
                        </div>
                        <h3 class="text-lg font-bold mb-2 line-clamp-2">${vuln.title}</h3>
                        <p class="text-gray-600 text-sm mb-4 line-clamp-3">${vuln.description}</p>
                        <div class="flex justify-between items-center text-xs text-gray-400">
                            <span>发布日期: ${vuln.publish_date}</span>
                            <span class="text-blue-600 font-medium">查看详情 →</span>
                        </div>
                    </div>
                </div>
            `).join('');

            renderPagination();
        }

        function renderPagination() {
            const totalPages = Math.ceil(filteredVulnerabilities.length / itemsPerPage);
            const container = document.getElementById('pagination');
            
            if (totalPages <= 1) {
                container.innerHTML = '';
                return;
            }

            let html = '';
            for (let i = 1; i <= totalPages; i++) {
                const activeClass = i === currentPage ? 'bg-blue-600 text-white' : 'bg-white text-gray-600 hover:bg-gray-100';
                html += `<button onclick="goToPage(${i})" class="px-4 py-2 border border-gray-300 rounded-lg ${activeClass}">${i}</button>`;
            }
            container.innerHTML = html;
        }

        function goToPage(page) {
            currentPage = page;
            renderList();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function getSeverityClass(severity) {
            const s = severity.toLowerCase();
            if (s.includes('high') || s.includes('critical')) return 'severity-high';
            if (s.includes('medium') || s.includes('warn')) return 'severity-medium';
            if (s.includes('low') || s.includes('info')) return 'severity-low';
            return 'text-gray-500';
        }

        // 搜索与过滤
        function applyFilters() {
            const searchTerm = document.getElementById('search-input').value.toLowerCase();
            const severityFilter = document.getElementById('severity-filter').value;

            filteredVulnerabilities = allVulnerabilities.filter(vuln => {
                const matchesSearch = vuln.title.toLowerCase().includes(searchTerm) || 
                                     vuln.cve.toLowerCase().includes(searchTerm) ||
                                     vuln.id.toLowerCase().includes(searchTerm);
                const matchesSeverity = !severityFilter || vuln.severity.toLowerCase().includes(severityFilter.toLowerCase());
                return matchesSearch && matchesSeverity;
            });

            currentPage = 1;
            renderList();
        }

        document.getElementById('search-input').addEventListener('input', applyFilters);
        document.getElementById('severity-filter').addEventListener('change', applyFilters);

        // 初始化
        fetchData();
    </script>
</body>
</html>
